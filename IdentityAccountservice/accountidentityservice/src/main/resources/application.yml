server:
  port: 8091

spring:
  application:
    name: ACCOUNTIDENTITYSERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/account_identity_service_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # NO spring.mail section — AWS SDK handles email via HTTPS

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

app:
  otp-expiry-minutes: 10
  bank-name: SecureBank
  from-email: warimahesh478@gmail.com    # verified identity in AWS SES

# AWS credentials — for SES SDK (HTTPS calls, no SMTP)
aws:
  region: ap-south-1



management:
  endpoints:
    web:
      exposure:
        include: health,info